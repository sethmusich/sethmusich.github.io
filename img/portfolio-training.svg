<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160">
  <rect width="600" height="160" fill="#1B2E4B"/>
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.2" fill="rgba(255,255,255,0.07)"/>
  </pattern>
  <rect width="600" height="160" fill="url(#dots)"/>
  <!-- diploma / certificate -->
  <rect x="228" y="32" width="144" height="96" rx="6" fill="none" stroke="#C9973A" stroke-width="2.5"/>
  <!-- ribbon accent -->
  <rect x="228" y="32" width="144" height="14" rx="6" fill="#C9973A" opacity="0.25"/>
  <line x1="228" y1="46" x2="372" y2="46" stroke="#C9973A" stroke-width="2" opacity="0.4"/>
  <!-- seal -->
  <circle cx="300" cy="78" r="18" fill="none" stroke="#C9973A" stroke-width="2" opacity="0.7"/>
  <circle cx="300" cy="78" r="12" fill="#C9973A" opacity="0.2"/>
  <!-- star in seal -->
  <polygon points="300,66 303,74 312,74 305,79 308,88 300,83 292,88 295,79 288,74 297,74" fill="#C9973A" opacity="0.7"/>
  <!-- text lines -->
  <rect x="252" y="104" width="96" height="5" rx="2.5" fill="#C9973A" opacity="0.35"/>
  <rect x="268" y="114" width="64" height="4" rx="2" fill="#C9973A" opacity="0.2"/>
  <text x="300" y="148" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="rgba(201,151,58,0.6)" text-anchor="middle" letter-spacing="2.5">IMPLEMENTATION · TRAINING · GO-LIVE</text>
</svg>
